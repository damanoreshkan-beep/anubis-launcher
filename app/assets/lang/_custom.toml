# Brand-specific overlay. Loaded LAST so its values override every locale.
# Keep ONLY values that are identical across all languages (URLs, product name).
# Translatable copy lives in en_US / ru_RU / uk_UA / de_DE / pl_PL.

[ejs.app]
title = "Anubis World Launcher"

[ejs.landing]
mediaGitHubURL = "https://github.com/damanoreshkan-beep/anubis-launcher"
mediaXURL = "#"
mediaInstagramURL = "#"
mediaYouTubeURL = "#"
mediaDiscordURL = "#"

[ejs.settings]
sourceGithubLink = "https://github.com/damanoreshkan-beep/anubis-launcher"
supportLink = "https://github.com/damanoreshkan-beep/anubis-launcher/issues"

# Native names of supported UI locales. Same in every language file
# (that's the point of native names) — so they live in the brand overlay.
[js.frameLang]
ru_RU = "Русский"
uk_UA = "Українська"
en_US = "English"
de_DE = "Deutsch"
pl_PL = "Polski"
