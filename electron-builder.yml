appId: 'com.anubisworld.launcher'
productName: 'Anubis World Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 Anubis World. Based on HeliosLauncher © 2018-2026 Daniel Scalzi (MIT).'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux:
  target: 'AppImage'
  icon: 'build/icon.png'
  maintainer: 'damanoreshkan-beep'
  vendor: 'Anubis World'
  synopsis: 'Anubis World — HiTech 1.12.2 launcher'
  description: 'Launcher for the Anubis World private Minecraft server. All mods, configs, and updates are handled automatically.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'

publish:
  provider: 'github'
  owner: 'damanoreshkan-beep'
  repo: 'anubis-launcher'